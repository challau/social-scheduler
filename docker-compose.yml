version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: socialflow_db
    restart: always
    environment:
      POSTGRES_USER: socialflow_user
      POSTGRES_PASSWORD: socialflow_password
      POSTGRES_DB: socialflow_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    container_name: socialflow_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build: ./backend
    container_name: socialflow_backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://socialflow_user:socialflow_password@db:5432/socialflow_db
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=super_secret_social_flow_ai_key_change_me
      - ALGORITHM=HS256
      - MOCK_MODE=false
    depends_on:
      - db
      - redis
    volumes:
      - ./uploads:/workspace/uploads

volumes:
  postgres_data:
  redis_data:
